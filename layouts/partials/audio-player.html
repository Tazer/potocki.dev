{{- $slug := .File.BaseFileName -}}
{{- $rel := printf "static/audio/%s.mp3" $slug -}}
{{- if fileExists $rel -}}
{{- $src := printf "/audio/%s.mp3" $slug -}}
<figure class="post-audio fade-in" style="animation-delay: 0.15s;">
  <figcaption class="post-audio__label">
    <span class="post-audio__prompt">$</span>
    <span>play voice-over</span>
  </figcaption>
  <audio class="post-audio__player" controls preload="metadata" src="{{ $src }}">
    Your browser does not support the audio element.
    <a href="{{ $src }}">Download MP3</a>
  </audio>
</figure>
<style>
.post-audio {
  margin: 1.25rem 0 1.5rem;
  padding: 0.75rem 0.85rem 0.85rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: var(--glow-green);
}
.post-audio__label {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.55rem;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text-secondary);
}
.post-audio__prompt {
  color: var(--green);
  text-shadow: var(--glow-green);
}
.post-audio__player {
  display: block;
  width: 100%;
  height: 36px;
  border-radius: 6px;
  color-scheme: dark;
  filter: hue-rotate(75deg) saturate(0.85);
}
.post-audio__player::-webkit-media-controls-panel {
  background: var(--bg-secondary);
}
</style>
{{- end -}}
