{{ define "main" }}
<div class="command-line fade-in">
  <span class="prompt-symbol">$</span>
  <span class="cmd">ls ~/tags/</span>
</div>

<div class="fade-in" style="margin-top: 1rem; display: flex; flex-wrap: wrap; gap: 0.5rem; animation-delay: 0.15s;">
  {{ range .Pages }}
  <a href="{{ .Permalink }}" class="tag" style="font-size: 0.8rem; padding: 0.3rem 0.75rem;">
    {{ .Title }} <span style="color: var(--text-secondary); margin-left: 0.25rem;">({{ len .Pages }})</span>
  </a>
  {{ end }}
</div>
{{ end }}
