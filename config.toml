baseurl = "https://potocki.dev"
title = "patrikpotocki"
theme = "hugo-coder"
languagecode = "en"
defaultcontentlanguage = "en"

paginate = 20
canonifyurls = true

pygmentsstyle = "bw"
pygmentscodefences = true
pygmentscodefencesguesssyntax = true

disqusShortname = "rambo3swe"

[params]
    author = "Patrik Potocki"
    info = "Developer .net golang aws docker kubernetes"
    description = "Patirk Potocki's personal website"
    keywords = "blog,developer,personal"
    avatarurl = "images/avatar.svg"

    favicon_32 = "/img/favicon-32x32.png"
    favicon_16 = "/img/favicon-16x16.png"

    footercontent = "Code"

    hidecredits = false
    hidecopyright = false

    rtl = false

    math = true
    custom_css = ["css/custom.css"]

